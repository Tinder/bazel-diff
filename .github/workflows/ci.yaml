name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-jre21:
    runs-on: ${{ matrix.os }}
    # contents:write is needed by the "Publish coverage badge" step below, which
    # commits the regenerated coverage.json back to master on push events and
    # to the PR head branch on internal pull requests. The step itself is gated
    # on the canonical matrix entry and a non-fork PR, but the permission has
    # to be declared at the job level.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bazel: '8.x'
          - os: ubuntu-latest
            bazel: '9.x'
          - os: macos-latest
            bazel: '8.x'
          - os: macos-latest
            bazel: '9.x'
    steps:
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: ^1.17
        id: go
      - name: Setup Bazelisk
        run: go install github.com/bazelbuild/bazelisk@latest && export PATH=$PATH:$(go env GOPATH)/bin
      - uses: actions/checkout@v4
      - name: Run bazel-diff tests
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        run: ~/go/bin/bazelisk coverage --combined_report=lcov //cli/... //tools:coverage_check_test --enable_bzlmod=true --enable_workspace=false
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-jre21-${{ matrix.os }}-bazel-${{ matrix.bazel }}
          path: bazel-out/_coverage/_coverage_report.dat
          if-no-files-found: warn
      - name: Generate coverage badge JSON
        # Decoupled from the threshold gate below so the badge still updates on
        # PRs that drop coverage. Passing --threshold 0 means this step never
        # fails on coverage value; the strict gate runs as its own step after
        # the badge has been published.
        env:
          # Must match the `Run bazel-diff tests` step above, otherwise bazelisk
          # downloads the default bazel from .bazelversion and starts a fresh
          # server whose output base loses track of the coverage report symlink
          # (seen flaking on macos-latest x bazel 9.x).
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
        run: ~/go/bin/bazelisk run //tools:coverage-check -- --badge-json coverage.json --threshold 0 bazel-out/_coverage/_coverage_report.dat
      - name: Publish coverage badge
        # Auto-commits coverage.json back to master on pushes and back to the
        # PR's head branch on internal pull requests so the README badge always
        # tracks the latest tested state. Skipped on:
        #   - any matrix entry other than the canonical Linux + Bazel 9.x
        #     runner (so the entries don't race to commit the same file), and
        #   - fork PRs (the default GITHUB_TOKEN is read-only against forks).
        if: |
          matrix.os == 'ubuntu-latest' && matrix.bazel == '9.x' && (
            (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
            (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
          )
        env:
          HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || 'master' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # actions/checkout fetches the merge commit for pull_request events;
            # the PR's head branch isn't in the local repo yet. Stash the
            # freshly-generated coverage.json, then switch to the PR head so the
            # commit lands where the PR author can see it.
            cp coverage.json /tmp/coverage.json
            git fetch origin "$HEAD_REF"
            git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
            cp /tmp/coverage.json coverage.json
          fi
          if [ -z "$(git status --porcelain coverage.json)" ]; then
            echo "coverage.json unchanged; nothing to publish."
            exit 0
          fi
          git add coverage.json
          # [skip ci] is belt-and-suspenders — GITHUB_TOKEN pushes already do
          # not retrigger workflows, but the marker makes the intent explicit
          # in the log.
          git commit -m "ci: update coverage badge [skip ci]"
          git push origin "HEAD:$HEAD_REF"
      - name: Enforce coverage threshold (>= 90% main-source line coverage)
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
          COVERAGE_THRESHOLD: '90'
        run: ~/go/bin/bazelisk run //tools:coverage-check -- bazel-out/_coverage/_coverage_report.dat
      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-jre21-${{ matrix.os }}-bazel-${{ matrix.bazel }}
          path: bazel-testlogs/
          if-no-files-found: warn
  test-jre11-run-example:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bazel: '7.x'
            disable_workspace: 'false'
            extra_flags: ''
          - os: ubuntu-latest
            bazel: '7.x'
            disable_workspace: 'false'
            extra_flags: '--incompatible_disable_native_repo_rules'
          - os: ubuntu-latest
            bazel: '8.x'
            disable_workspace: 'true'
            extra_flags: ''
          - os: ubuntu-latest
            bazel: '8.6.0rc1'
            disable_workspace: 'true'
            extra_flags: ''
          - os: ubuntu-latest
            bazel: '8.x'
            disable_workspace: 'true'
            extra_flags: '--incompatible_disable_native_repo_rules'
          - os: ubuntu-latest
            bazel: '9.x'
            disable_workspace: 'true'
            extra_flags: ''
          - os: ubuntu-latest
            bazel: '9.x'
            disable_workspace: 'true'
            extra_flags: '--incompatible_disable_native_repo_rules'
          # Skip Windows + Bazel 7.x due to protobuf compilation issues on MSVC
          # Windows is tested with Bazel 8.x and 9.x which are more current
          - os: windows-latest
            bazel: '8.x'
            disable_workspace: 'true'
            extra_flags: ''
          - os: windows-latest
            bazel: '9.x'
            disable_workspace: 'true'
            extra_flags: ''
    steps:
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
        id: java
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: ^1.17
        id: go
      - name: Setup Bazelisk (Linux/macOS)
        if: runner.os != 'Windows'
        run: go install github.com/bazelbuild/bazelisk@latest && export PATH=$PATH:$(go env GOPATH)/bin
      - name: Setup Bazelisk (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          $env:PATH = "$env:PATH;$(go env GOPATH)\bin"
          echo "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run bazel-diff example script (Linux)
        if: runner.os != 'Windows'
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
          BAZEL_DIFF_DISABLE_WORKSPACE: ${{ matrix.disable_workspace }}
          BAZEL_DIFF_FORCE_CHECKOUT: true
          BAZEL_EXTRA_COMMAND_OPTIONS: ${{ matrix.extra_flags }}
        run: ./bazel-diff-example.sh "$GITHUB_WORKSPACE" ~/go/bin/bazelisk $(git rev-parse HEAD~1) $(git rev-parse HEAD)
      - name: Run bazel-diff example script (Windows)
        if: runner.os == 'Windows'
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
          BAZEL_DIFF_DISABLE_WORKSPACE: ${{ matrix.disable_workspace }}
          BAZEL_DIFF_FORCE_CHECKOUT: true
          BAZEL_EXTRA_COMMAND_OPTIONS: ${{ matrix.extra_flags }}
        shell: pwsh
        run: |
          $prevRev = git rev-parse HEAD~1
          $currRev = git rev-parse HEAD
          .\bazel-diff-example.ps1 -WorkspacePath "$env:GITHUB_WORKSPACE" -BazelPath "$env:USERPROFILE\go\bin\bazelisk.exe" -PreviousRevision $prevRev -FinalRevision $currRev
  deploy:
    needs: [test-jre21]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      matrix:
        java: [ '11' ]
    steps:
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
        id: java
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: ^1.17
        id: go
      - name: Setup Bazelisk
        run: go install github.com/bazelbuild/bazelisk@latest && export PATH=$PATH:$(go env GOPATH)/bin
      - uses: actions/checkout@v4
      - name: Build deployable JAR
        run: ~/go/bin/bazelisk build //cli:bazel-diff_deploy.jar
      - uses: actions/upload-artifact@v4
        with:
          name: bazel-diff_deploy.jar
          path: bazel-bin/cli/bazel-diff_deploy.jar
          if-no-files-found: error
      - name: Build release source archive
        run: make release_source_archive
      - uses: actions/upload-artifact@v4
        with:
          name: release.tar.gz
          path: archives/release.tar.gz
          if-no-files-found: error
